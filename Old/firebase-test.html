<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Firebase</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  width:350px;
  box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
  text-align:center;
  color:#f97316;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#f97316;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  opacity:.9;
}

.link{
  text-align:center;
  margin-top:10px;
  color:#f97316;
  cursor:pointer;
}

#status{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h2>🔥 Firebase Test</h2>

<input type="email"
       id="email"
       placeholder="Votre email">

<input type="password"
       id="password"
       placeholder="Mot de passe">

<button onclick="login()">
Connexion
</button>

<div class="link" onclick="resetPassword()">
Mot de passe oublié ?
</div>

<button onclick="logout()">
Déconnexion
</button>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  signOut
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDagghvP8ujE0fdUcYsOfmLaXps2ZSUexo",
  authDomain: "phil-mobile.firebaseapp.com",
  projectId: "phil-mobile",
  storageBucket: "phil-mobile.firebasestorage.app",
  messagingSenderId: "193213939481",
  appId: "1:193213939481:web:f8a750e89f0e645b62cf88",
  measurementId: "G-6TJR9GTK90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){

  const email =
    document.getElementById('email').value;

  const password =
    document.getElementById('password').value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    document.getElementById('status').innerHTML =
      "✅ Connecté";

  }catch(err){

    document.getElementById('status').innerHTML =
      "❌ " + err.message;

  }
}

window.resetPassword = async function(){

  const email =
    document.getElementById('email').value;

  if(!email){
    alert("Entrez votre email");
    return;
  }

  try{

    await sendPasswordResetEmail(
      auth,
      email
    );

    alert("Email envoyé");

  }catch(err){

    alert(err.message);

  }
}

window.logout = async function(){

  await signOut(auth);

  document.getElementById('status').innerHTML =
    "🔒 Déconnecté";

}

</script>

</body>
</html>
