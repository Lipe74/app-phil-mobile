<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <link rel="icon"
      type="image/png"
      href="images/logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Contrats & ASP - V2.0</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0}
.app{max-width:1100px;margin:auto;padding:12px 20px;}
.header{background:#ff5a14;color:#fff;padding:20px;border-radius:20px}
.tabs{display:flex;gap:10px;margin:15px 0;flex-wrap:wrap}
.tabbtn{padding:10px 15px;border:none;border-radius:10px;background:#ff5a14;color:#fff;cursor:pointer}
.section{background:#fff;border:1px solid #ffb680;border-radius:18px;padding:20px;margin-bottom:15px}
.hidden{display:none}
input{
  width:100%;
  padding:8px;
  margin:2px 0 6px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}
  select{
  width:100%;
  padding:8px;
  margin:2px 0 6px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}
.row{display:flex;justify-content:space-between;margin:8px 0;align-items:center;}
.counter button{width:30px;height:30px;border-radius:8px;border:1px solid #ffb680;background:#fff;cursor:pointer;font-weight:700;color:#ff5a14;}
.counter span{display:inline-block;min-width:24px;text-align:center;font-weight:700;}
.card{background:#fafafa;border-radius:10px;padding:10px;margin:8px 0}

input:focus,
select:focus{
  outline:none;
  border-color:#ff5a14;
  box-shadow:0 0 0 4px rgba(255,90,20,.15);
}

.card-client{
  background:white;
  border-radius:18px;
  padding:20px;
  border:2px solid #ffb680;
  margin-bottom:20px;
}

.card-client h3{
  color:#ff5a14;
  margin-bottom:15px;
}

.client-type{
  display:flex;
  gap:12px;
  margin-top:15px;
}

.type-card{
  flex:1;
  text-align:center;
  padding:14px;
  border:2px solid #ffd1b8;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  background:#fffaf7;
}

.type-card:hover{
  border-color:#ff5a14;
}
 .form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media(max-width:768px){
  .form-grid{
    grid-template-columns:1fr;
  }
}
.date-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:10px;
}

@media(max-width:768px){

  .date-grid{
    grid-template-columns:1fr;
  }

}

.asp-badge{
  display:inline-block;
  background:#fff3e8;
  color:#ff5a14;
  border:1px solid #ffb680;
  border-radius:99px;
  padding:2px 10px;
  font-size:11px;
  font-weight:700;
  margin-left:8px;
}

.asp-total-banner{
  background:linear-gradient(90deg,#ff5a14,#ff8c47);
  color:#fff;
  border-radius:16px;
  padding:16px 20px;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}
.asp-total-banner .val{font-size:28px;font-weight:700;}
.asp-total-banner .label{font-size:12px;opacity:.9;}

/* Login */
#login-screen{
  max-width:360px;margin:80px auto;text-align:center;
  background:#fff;border:2px solid #ff5a14;border-radius:18px;padding:30px 24px;
}
#login-screen input{text-align:center;}
#login-screen button{
  background:#ff5a14;color:#fff;border:none;padding:11px 28px;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;width:100%;
}
#login-error{color:#e24b4a;font-size:12px;margin-bottom:10px;display:none;}

#app-content{display:none;}

#toast{
  position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;
  padding:12px 18px;border-radius:8px;font-size:13px;display:none;z-index:2000;
}
</style>
</head>
<body>

<div class="app">

<div id="login-screen">
  <h2 style="color:#ff5a14;">🔐 Mes Contrats</h2>
  <div id="login-error">Identifiants incorrects.</div>
  <input type="email" id="login-email" placeholder="Email" autocomplete="email">
  <input type="password" id="login-password" placeholder="Mot de passe" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin();">
  <button onclick="doLogin()">Connexion</button>
</div>

<div id="app-content">

<div class="header">
  <h1>📋 Mes contrats</h1>
  <div>Build V2.0</div>
</div>

<div class="asp-total-banner">
  <div>
    <div class="val" id="asp-total-display">0</div>
    <div class="label">ASP total (de départ + contrats)</div>
  </div>
  <div style="text-align:right;">
    <div class="label" id="asp-breakdown">Départ: 0 · Contrats: 0</div>
  </div>
</div>

<div class="search-box">
  <input
    id="searchBox"
    type="text"
    placeholder="🔍 Rechercher un client, société, TVA..."
    onkeyup="searchContracts()">
</div>

<div class="tabs">
<button class="tabbtn" onclick="showTab('new')">📋 Nouveau</button>
<button class="tabbtn" onclick="showTab('history')">📚 Historique</button>
<button class="tabbtn" onclick="showTab('stats')">📊 Statistiques</button>
</div>

<div id="new" class="section">

<div class="card-client">

<h3>👤 Informations client</h3>

<div class="form-grid">

  <input id="nom"
         placeholder="👤 Nom du client (ex : Jean Dupont)">

  <input id="societe"
         placeholder="🏢 Société (ex : Dupont Consulting SRL)">

  <input id="tel"
         placeholder="📞 Téléphone (ex : 0475 24 02 05)">

  <input id="tva"
         placeholder="🧾 TVA (ex : BE0123456789)">

  <input id="clientOrange"
         placeholder="🟧 N° Client Orange (ex : 1.9763217)">

  <input id="contratSmart"
         placeholder="📋 N° Contrat My Smart (ex : 0000282697)">
  <input id="email"
       placeholder="📧 E-mail">

<input id="adresse"
       placeholder="📍 Ville ou adresse">

</div>

<div class="date-grid">

  <div>
    <label>📅 Date du contrat</label>
    <input type="date" id="dateContrat">
  </div>

  <div>
    <label>📊 État du contrat</label>

    <select id="etatContrat">

      <option value="Encodé">📝 Encodé</option>
      <option value="Activé">✅ Activé</option>
      <option value="En attente">⏳ En attente</option>
      <option value="Annulé">❌ Annulé</option>
      <option value="Refusé">🚫 Refusé</option>

    </select>

  </div>

</div>

<div class="client-type">
<label class="type-card">
<input type="radio"
       name="typeClient"
       value="Particulier"
       checked
       onchange="updateAspPreview()">
👤 Particulier
</label>

<label class="type-card">
<input type="radio"
       name="typeClient"
       value="SoHo"
       onchange="updateAspPreview()">
🏢 SoHo
</label>

</div>

</div>

<h2>📱 Produits <span class="asp-badge" id="asp-preview">+0 ASP</span></h2>
<div id="products"></div>

<button class="tabbtn" onclick="saveContract()">💾 Enregistrer le contrat</button>
</div>

<div id="history" class="section hidden">
<h2>📚 Historique</h2>
<div id="historyList"></div>
</div>

<div id="stats" class="section hidden">
<h2>📊 Statistiques</h2>
<div id="statsContent"></div>
</div>

</div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  query,
  where
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDagghvP8ujE0fdUcYsOfmLaXps2ZSUexo",
  authDomain: "phil-mobile.firebaseapp.com",
  projectId: "phil-mobile",
  storageBucket: "phil-mobile.firebasestorage.app",
  messagingSenderId: "193213939481",
  appId: "1:193213939481:web:f8a750e89f0e645b62cf88",
  measurementId: "G-6TJR9GTK90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.db = db;
window.doc = doc;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.updateDoc = updateDoc;
window.query = query;
window.where = where;

let currentConsultant = null;

window.doLogin = async function () {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  try {
    await signInWithEmailAndPassword(auth, email, password);
    document.getElementById('login-error').style.display = 'none';
  } catch (err) {
    document.getElementById('login-error').textContent = 'Email ou mot de passe incorrect.';
    document.getElementById('login-error').style.display = 'block';
  }
};

window.doLogout = async function () {
  await signOut(auth);
  location.reload();
};

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('app-content').style.display = 'none';
    return;
  }

  // Retrouver le profil consultant correspondant à cet email
  const snap = await getDocs(collection(db, 'consultants'));
  let found = null;
  let foundDocId = null;
  snap.forEach(d => {
    const c = d.data();
    if (c.email && c.email.toLowerCase() === user.email.toLowerCase()) {
      found = c;
      foundDocId = d.id;
    }
  });

  if (!found) {
    document.getElementById('login-error').textContent = 'Aucun profil consultant trouvé pour ce compte.';
    document.getElementById('login-error').style.display = 'block';
    await signOut(auth);
    return;
  }

  currentConsultant = { ...found, docId: foundDocId };
  window._currentConsultantId = found.id || foundDocId;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';

  // Pré-remplir la date du jour
  document.getElementById('dateContrat').value = new Date().toISOString().slice(0, 10);

  window.refreshAspTotal();
});

// --- Barème ASP par produit ---
const ASP_BAREME = {
  small:          { base: 1, bonusSoho: 0 },
  medium:         { base: 1, bonusSoho: 0.5 },
  large:          { base: 1, bonusSoho: 0.5 },
  unlimited:      { base: 1, bonusSoho: 0.5 },
  internetStart:  { base: 1, bonusSoho: 0.5 },
  internetZen:    { base: 1, bonusSoho: 0.5 },
  internetGiga:   { base: 1, bonusSoho: 0.5 },
  tv:             { base: 1, bonusSoho: 0 },
  fixe:           { base: 0, bonusSoho: 0 },
  flybox:         { base: 1, bonusSoho: 0.5 }
};

window.calcContractASP = function (produits, typeClient) {
  let total = 0;
  const isSoho = typeClient === 'SoHo';
  Object.keys(produits).forEach(p => {
    const q = produits[p] || 0;
    const bareme = ASP_BAREME[p];
    if (!bareme || q <= 0) return;
    const aspParUnite = bareme.base + (isSoho ? bareme.bonusSoho : 0);
    total += aspParUnite * q;
  });
  return total;
};

// --- Recalcul du total ASP (départ + somme des contrats actifs) ---
window.refreshAspTotal = async function () {
  if (!currentConsultant) return;

  const snap = await getDocs(query(
    collection(db, 'contrats'),
    where('consultantId', '==', currentConsultant.id)
  ));

  let aspFromContracts = 0;
  snap.forEach(d => {
    const c = d.data();
    if (c.etatContrat === 'Annulé' || c.etatContrat === 'Refusé') return;
    aspFromContracts += c.aspTotal || 0;
  });

  const aspInit = currentConsultant.aspInit || 0;
  const total = aspInit + aspFromContracts;

  document.getElementById('asp-total-display').textContent = Math.round(total * 10) / 10;
  document.getElementById('asp-breakdown').textContent =
    `Départ: ${aspInit} · Contrats: ${Math.round(aspFromContracts * 10) / 10}`;

  // Mettre à jour aspFromContracts dans le profil consultant (pour que le hub principal puisse l'utiliser aussi)
  try {
    await updateDoc(doc(db, 'consultants', currentConsultant.docId), {
      aspFromContracts: Math.round(aspFromContracts * 10) / 10
    });
  } catch (err) {
    console.log('Mise à jour aspFromContracts impossible:', err.message);
  }
};
</script>

<script>
const productNames=[
  "small",
  "medium",
  "large",
  "unlimited",

  "internetStart",
  "internetZen",
  "internetGiga",

  "tv",
  "fixe",
  "flybox"
];

const labels={

  small:"📱 Mobile Small",
  medium:"📱 Mobile Medium",
  large:"📱 Mobile Large",
  unlimited:"♾️ Mobile Unlimited",

  internetStart:"🌐 Internet Start",
  internetZen:"🌐 Internet Zen",
  internetGiga:"🚀 Internet Giga",

  tv:"📺 TV",
  fixe:"☎️ Fixe",
  flybox:"📡 Flybox"

};

let qty={};

productNames.forEach(p=>qty[p]=0);

const container=document.getElementById('products');
productNames.forEach(p=>{
 const d=document.createElement('div');
 d.className='row';
 d.innerHTML=`<span>${labels[p]}</span>
 <span class="counter">
 <button onclick="chg('${p}',-1)">-</button>
 <span id="${p}">0</span>
 <button onclick="chg('${p}',1)">+</button>
 </span>`;
 container.appendChild(d);
});

function chg(id,d){
 qty[id]=Math.max(0,qty[id]+d);
 document.getElementById(id).textContent=qty[id];
 updateAspPreview();
}

function getSelectedTypeClient(){
  const radios = document.getElementsByName('typeClient');
  for (const r of radios) if (r.checked) return r.value;
  return 'Particulier';
}

function updateAspPreview(){
  const typeClient = getSelectedTypeClient();
  const asp = window.calcContractASP ? window.calcContractASP(qty, typeClient) : 0;
  const el = document.getElementById('asp-preview');
  if (el) el.textContent = `+${Math.round(asp*10)/10} ASP`;
}

function showTab(id){
 document.querySelectorAll('.section').forEach(x=>x.classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
 if(id==='history') renderHistory();
 if(id==='stats') renderStats();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

window._allContracts = [];

async function saveContract(){
 const nom = document.getElementById('nom').value.trim();
 if (!nom) {
   alert('Merci de renseigner au moins le nom du client.');
   return;
 }

 const typeClient = getSelectedTypeClient();
 const aspTotal = window.calcContractASP(qty, typeClient);

 const data = {
   consultantId: window._currentConsultantId,
   date: new Date().toISOString(),
   nom,
   societe: document.getElementById('societe').value.trim(),
   tel: document.getElementById('tel').value.trim(),
   tva: document.getElementById('tva').value.trim(),
   clientOrange: document.getElementById('clientOrange').value.trim(),
   contratSmart: document.getElementById('contratSmart').value.trim(),
   email: document.getElementById('email').value.trim(),
   adresse: document.getElementById('adresse').value.trim(),
   dateContrat: document.getElementById('dateContrat').value,
   etatContrat: document.getElementById('etatContrat').value,
   typeClient,
   produits: {...qty},
   aspTotal
 };

 try {
   await window.addDoc(window.collection(window.db, 'contrats'), data);
   showToast(`✅ Contrat enregistré (+${Math.round(aspTotal*10)/10} ASP)`);

   // Réinitialiser le formulaire
   ['nom','societe','tel','tva','clientOrange','contratSmart','email','adresse'].forEach(id => {
     document.getElementById(id).value = '';
   });
   productNames.forEach(p=>{ qty[p]=0; document.getElementById(p).textContent='0'; });
   updateAspPreview();

   if (window.refreshAspTotal) await window.refreshAspTotal();

 } catch(err) {
   alert('Erreur lors de l\'enregistrement: ' + err.message);
 }
}

async function loadContracts(){
  const snap = await window.getDocs(window.query(
    window.collection(window.db, 'contrats'),
    window.where('consultantId', '==', window._currentConsultantId)
  ));
  const list = [];
  snap.forEach(d => list.push({ docId: d.id, ...d.data() }));
  list.sort((a,b) => new Date(b.date) - new Date(a.date));
  window._allContracts = list;
  return list;
}

async function renderHistory(){

  const data = await loadContracts();
  let html='';

  data.forEach((c)=>{

    html+=`
    <div class="card">

      <b>👤 ${escapeHtml(c.nom||'Sans nom')}</b>
      <span class="asp-badge">+${Math.round((c.aspTotal||0)*10)/10} ASP</span><br>

      🏢 ${escapeHtml(c.societe||'-')}<br>

      📅 ${c.dateContrat ? new Date(c.dateContrat).toLocaleDateString() : new Date(c.date).toLocaleDateString()}<br>

      📊 ${escapeHtml(c.etatContrat||'Encodé')} · ${escapeHtml(c.typeClient||'Particulier')}<br><br>

      <button onclick="viewContract('${c.docId}')">
      👁 Voir
      </button>

      <button onclick="changeStatus('${c.docId}')">
      🔄 Changer statut
      </button>

    </div>
    `;

  });

  document.getElementById('historyList').innerHTML =
    html || 'Aucun contrat';

}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

function viewContract(docId){
  const c = window._allContracts.find(x => x.docId === docId);
  if (!c) return;
  const produitsTxt = Object.keys(c.produits||{})
    .filter(p => c.produits[p] > 0)
    .map(p => `${labels[p]||p}: ${c.produits[p]}`)
    .join('\n');
  alert(
    `Client: ${c.nom}\nSociété: ${c.societe||'-'}\nTél: ${c.tel||'-'}\nEmail: ${c.email||'-'}\n` +
    `TVA: ${c.tva||'-'}\nType: ${c.typeClient}\nÉtat: ${c.etatContrat}\n` +
    `ASP: ${c.aspTotal}\n\nProduits:\n${produitsTxt || 'Aucun'}`
  );
}

async function changeStatus(docId){
  const c = window._allContracts.find(x => x.docId === docId);
  if (!c) return;
  const options = ['Encodé','Activé','En attente','Annulé','Refusé'];
  const choice = prompt('Nouveau statut (' + options.join(' / ') + '):', c.etatContrat);
  if (!choice || !options.includes(choice)) return;

  try {
    await window.updateDoc(window.doc(window.db, 'contrats', docId), { etatContrat: choice });
    showToast('Statut mis à jour.');
    renderHistory();
    if (window.refreshAspTotal) await window.refreshAspTotal();
  } catch(err) {
    alert('Erreur: ' + err.message);
  }
}

async function renderStats(){
 const data = await loadContracts();
 let totals={};
 productNames.forEach(p=>totals[p]=0);
 let totalASP = 0;
 data.forEach(c=>{
   if (c.etatContrat === 'Annulé' || c.etatContrat === 'Refusé') return;
   productNames.forEach(p=>totals[p]+=(c.produits&&c.produits[p])||0);
   totalASP += c.aspTotal || 0;
 });
 let html=`<div class="card"><b>Contrats actifs :</b> ${data.filter(c=>c.etatContrat!=='Annulé'&&c.etatContrat!=='Refusé').length}</div>`;
 html+=`<div class="card"><b>ASP généré par les contrats :</b> ${Math.round(totalASP*10)/10}</div>`;
 productNames.forEach(p=>{ if (totals[p] > 0) html+=`<div class="card">${labels[p]} : ${totals[p]}</div>`; });
 document.getElementById('statsContent').innerHTML=html;
}

function searchContracts(){

  const term =
    document.getElementById('searchBox')
    .value
    .toLowerCase();

  const cards =
    document.querySelectorAll('#historyList .card');

  cards.forEach(card=>{

    const txt =
      card.textContent.toLowerCase();

    card.style.display =
      txt.includes(term)
      ? 'block'
      : 'none';

  });

}

window.saveContract = saveContract;
window.viewContract = viewContract;
window.changeStatus = changeStatus;
window.showTab = showTab;
window.searchContracts = searchContracts;
window.chg = chg;
window.updateAspPreview = updateAspPreview;
</script>

</body>
</html>
