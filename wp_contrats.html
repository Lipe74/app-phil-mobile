<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <link rel="icon"
      type="image/png"
      href="images/logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Contrats & ASP - V2.0</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0}
.app{max-width:1100px;margin:auto;padding:12px 20px;}
.header{background:#ff5a14;color:#fff;padding:20px;border-radius:20px}
.tabs{display:flex;gap:10px;margin:15px 0;flex-wrap:wrap}
.tabbtn{padding:10px 15px;border:none;border-radius:10px;background:#ff5a14;color:#fff;cursor:pointer}
.section{background:#fff;border:1px solid #ffb680;border-radius:18px;padding:20px;margin-bottom:15px}
.hidden{display:none}
input{
  width:100%;
  padding:8px;
  margin:2px 0 6px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}
  select{
  width:100%;
  padding:8px;
  margin:2px 0 6px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}
.row{display:flex;justify-content:space-between;margin:8px 0;align-items:center;}
.counter button{width:30px;height:30px;border-radius:8px;border:1px solid #ffb680;background:#fff;cursor:pointer;font-weight:700;color:#ff5a14;}
.counter span{display:inline-block;min-width:24px;text-align:center;font-weight:700;}
.card{background:#fafafa;border-radius:10px;padding:10px;margin:8px 0}

input:focus,
select:focus{
  outline:none;
  border-color:#ff5a14;
  box-shadow:0 0 0 4px rgba(255,90,20,.15);
}

.card-client{
  background:white;
  border-radius:18px;
  padding:20px;
  border:2px solid #ffb680;
  margin-bottom:20px;
}

.card-client h3{
  color:#ff5a14;
  margin-bottom:15px;
}

.client-type{
  display:flex;
  gap:12px;
  margin-top:15px;
}

.type-card{
  flex:1;
  text-align:center;
  padding:14px;
  border:2px solid #ffd1b8;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  background:#fffaf7;
}

.type-card:hover{
  border-color:#ff5a14;
}
 .form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media(max-width:768px){
  .form-grid{
    grid-template-columns:1fr;
  }
}
.date-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:10px;
}

@media(max-width:768px){

  .date-grid{
    grid-template-columns:1fr;
  }

}

.asp-badge{
  display:inline-block;
  background:#fff3e8;
  color:#ff5a14;
  border:1px solid #ffb680;
  border-radius:99px;
  padding:2px 10px;
  font-size:11px;
  font-weight:700;
  margin-left:8px;
}

.asp-total-banner{
  background:linear-gradient(90deg,#ff5a14,#ff8c47);
  color:#fff;
  border-radius:16px;
  padding:16px 20px;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}
.asp-total-banner .val{font-size:28px;font-weight:700;}
.asp-total-banner .label{font-size:12px;opacity:.9;}

.product-block{
  border:1px solid #ffd1b8;
  border-radius:14px;
  padding:12px 14px;
  margin-bottom:10px;
  background:#fffaf7;
}
.product-block-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:700;
  color:#ff5a14;
  margin-bottom:8px;
}
.add-unit-btn{
  background:#ff5a14;color:#fff;border:none;border-radius:8px;
  padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;
}
.unit-row{
  background:#fff;
  border:1px solid #ffe2cc;
  border-radius:10px;
  padding:8px 12px;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  font-size:12px;
}
.unit-row .unit-num{
  font-weight:700;color:#ff5a14;min-width:60px;
}
.unit-row label{
  display:flex;align-items:center;gap:4px;width:auto;cursor:pointer;font-weight:600;color:#555;
}
.unit-row .unit-eur{
  margin-left:auto;font-weight:700;color:#ff5a14;font-family:monospace;
}
.unit-row .remove-unit{
  background:#fde2e1;color:#c0392b;border:1px solid #f5b7b1;border-radius:6px;
  padding:3px 8px;cursor:pointer;font-size:11px;
}

/* Login */
#login-screen{
  max-width:360px;margin:80px auto;text-align:center;
  background:#fff;border:2px solid #ff5a14;border-radius:18px;padding:30px 24px;
}
#login-screen input{text-align:center;}
#login-screen button{
  background:#ff5a14;color:#fff;border:none;padding:11px 28px;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;width:100%;
}
#login-error{color:#e24b4a;font-size:12px;margin-bottom:10px;display:none;}

#app-content{display:none;}

#toast{
  position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;
  padding:12px 18px;border-radius:8px;font-size:13px;display:none;z-index:2000;
}
</style>
</head>
<body>

<div class="app">

<div id="login-screen">
  <h2 style="color:#ff5a14;">🔐 Mes Contrats</h2>
  <div id="login-error">Identifiants incorrects.</div>
  <input type="email" id="login-email" placeholder="Email" autocomplete="email">

<div id="app-content">

<div class="header">

</div>

<div class="asp-total-banner">
  <div>
    <div class="val" id="asp-total-display">0</div>
    <div class="label">ASP total (de départ + contrats)</div>
  </div>
  <div style="text-align:right;">

<div class="search-box">

<div class="card-client">

<h3>👤 Informations client</h3>

<div class="form-grid">

  <input id="nom"

  <input id="societe"

<input id="adresse"

  <div>

    <select id="etatContrat">

</div>

</div>

<div class="asp-badge" id="contract-summary" style="display:block;width:100%;box-sizing:border-box;margin-bottom:12px;padding:10px 14px;font-size:13px;">
  Statut actuel : <b id="consultant-statut-label">—</b> · Total contrat : <b><span id="contract-asp-preview">0</span> ASP</b> · <b><span id="contract-eur-preview">0,00 €</span></b>
</div>

<h2>📱 Produits</h2>
<div id="products"></div>

<button class="tabbtn" onclick="saveContract()">💾 Enregistrer le contrat</button>
</div>

<h2>📚 Historique</h2>
<div id="historyList"></div>
</div>

<div id="stats" class="section hidden">
<h2>📊 Statistiques</h2>
<div id="statsContent"></div>
</div>

</div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  query,
  where,
  deleteDoc
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDagghvP8ujE0fdUcYsOfmLaXps2ZSUexo",
  authDomain: "phil-mobile.firebaseapp.com",
  projectId: "phil-mobile",
  storageBucket: "phil-mobile.firebasestorage.app",
  messagingSenderId: "193213939481",
  appId: "1:193213939481:web:f8a750e89f0e645b62cf88",
  measurementId: "G-6TJR9GTK90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.db = db;
window.doc = doc;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.updateDoc = updateDoc;
window.query = query;
window.where = where;
window.deleteDoc = deleteDoc;

let currentConsultant = null;

window.doLogin = async function () {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  try {
    await signInWithEmailAndPassword(auth, email, password);
    document.getElementById('login-error').style.display = 'none';
  } catch (err) {
    document.getElementById('login-error').textContent = 'Email ou mot de passe incorrect.';
    document.getElementById('login-error').style.display = 'block';
  }
};

window.doLogout = async function () {
  await signOut(auth);
  location.reload();
};

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('app-content').style.display = 'none';
    return;
  }

  // Retrouver le profil consultant correspondant à cet email
  const snap = await getDocs(collection(db, 'consultants'));
  let found = null;
  let foundDocId = null;
  snap.forEach(d => {
    const c = d.data();
    if (c.email && c.email.toLowerCase() === user.email.toLowerCase()) {
      found = c;
      foundDocId = d.id;
    }
  });

  if (!found) {
    document.getElementById('login-error').textContent = 'Aucun profil consultant trouvé pour ce compte.';
    document.getElementById('login-error').style.display = 'block';
    await signOut(auth);
    return;
  }

  currentConsultant = { ...found, docId: foundDocId };
  window._currentConsultantId = found.id || foundDocId;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-content').style.display = 'block';

  // Calcul du statut (BC ou SC+) à partir de l'ASP total actuel, même seuil que wp_consultant_hub.html (SC à 70 pts)
  const aspTotal = (found.aspInit || 0) + (found.aspFromContracts || 0);
  window._currentConsultantStatut = aspTotal >= 70 ? 'SC' : 'BC';
  const statutLabelEl = document.getElementById('consultant-statut-label');
  if (statutLabelEl) {
    statutLabelEl.textContent = window._currentConsultantStatut === 'SC' ? 'SC ou +' : 'BC';
  }

  // Pré-remplir la date du jour
  document.getElementById('dateContrat').value = new Date().toISOString().slice(0, 10);

  window.refreshAspTotal();
  if (window.updateContractPreview) window.updateContractPreview();
});

// --- Recalcul du total ASP (départ + somme des contrats actifs) ---
window.refreshAspTotal = async function () {
  if (!currentConsultant) return;

  const snap = await getDocs(query(
    collection(db, 'contrats'),
    where('consultantId', '==', currentConsultant.id)
  ));

  let aspFromContracts = 0;
  snap.forEach(d => {
    const c = d.data();
    if (c.etatContrat === 'Annulé' || c.etatContrat === 'Refusé') return;
    aspFromContracts += c.aspTotal || 0;
  });

  const aspInit = currentConsultant.aspInit || 0;
  const total = aspInit + aspFromContracts;

  document.getElementById('asp-total-display').textContent = Math.round(total * 10) / 10;
  document.getElementById('asp-breakdown').textContent =
    `Départ: ${aspInit} · Contrats: ${Math.round(aspFromContracts * 10) / 10}`;

  // Mettre à jour aspFromContracts dans le profil consultant (pour que le hub principal puisse l'utiliser aussi)
  try {
    await updateDoc(doc(db, 'consultants', currentConsultant.docId), {
      aspFromContracts: Math.round(aspFromContracts * 10) / 10
    });
  } catch (err) {
    console.log('Mise à jour aspFromContracts impossible:', err.message);
  }
};
</script>

<script>
// Barème exact repris de wp_rem.html : rates = [BC, SC+, Convergence, Portabilité, SoHo-Indép]
// null = bonus non applicable à ce produit
const PRODUCTS = [
  { id: "flybox",    label: "📡 Home Flybox",        cat: "fixe",   rates: [25,  30,   null, null, null], asp: 1, aspSoho: 0.5 },
  { id: "internet",  label: "🌐 Internet",            cat: "fixe",   rates: [15,  20,   15,   12,   null], asp: 1, aspSoho: 0.5 },
  { id: "tv",        label: "📺 TV Orange",           cat: "fixe",   rates: [10,  10,   null, null, null], asp: 1, aspSoho: 0 },
  { id: "child",     label: "👶 Mobile Child",        cat: "mobile", rates: [1,   5,    null, null, null], asp: 0, aspSoho: 0 },
  { id: "small",     label: "📱 Mobile Small",        cat: "mobile", rates: [10,  15,   null, null, null], asp: 1, aspSoho: 0 },
  { id: "medium",    label: "📱 Mobile Medium",       cat: "mobile", rates: [35,  40,   12,   20,   15],   asp: 1, aspSoho: 0.5 },
  { id: "unlimited", label: "♾️ Mobile Unlimited",     cat: "mobile", rates: [60,  65,   12,   20,   15],   asp: 1, aspSoho: 0.5 },
  { id: "large",     label: "📱 Mobile Large",        cat: "mobile", rates: [50,  55,   12,   20,   15],   asp: 1, aspSoho: 0.5 },
  { id: "eneco_elec",label: "⚡ Eneco Électricité",    cat: "energy", rates: [20,  25,   null, null, 20],   asp: 0.5, aspSoho: 0 },
  { id: "eneco_gaz", label: "🔥 Eneco Gaz",            cat: "energy", rates: [20,  25,   null, null, 20],   asp: 0.5, aspSoho: 0 },
  { id: "chaudiere", label: "🔧 Entretien chaudière",  cat: "energy", rates: [20,  25,   null, null, null], asp: 0.5, aspSoho: 0 },
  { id: "ebilling",  label: "📧 eBilling",             cat: "other",  rates: [5,   5,    null, null, null], asp: 0, aspSoho: 0 },
  { id: "domicil",   label: "🏦 Domiciliation",        cat: "other",  rates: [5,   5,    null, null, null], asp: 0, aspSoho: 0 }
];

// units[productId] = liste d'objets { convergence: bool, portabilite: bool, sohoIndep: bool }
let units = {};
PRODUCTS.forEach(p => units[p.id] = []);

function getConsultantTarifIndex(){
  // 0 = BC, 1 = SC ou +
  if (window._currentConsultantStatut && window._currentConsultantStatut !== 'BC') return 1;
  return 0;
}

function addUnit(productId){
  units[productId].push({ convergence:false, portabilite:false, sohoIndep:false });
  renderProductBlock(productId);
  updateContractPreview();
}

function removeUnit(productId, index){
  units[productId].splice(index, 1);
  renderProductBlock(productId);
  updateContractPreview();
}

function toggleUnitFlag(productId, index, flag){
  units[productId][index][flag] = !units[productId][index][flag];
  renderProductBlock(productId);
  updateContractPreview();
}

function calcUnitEUR(product, unit){
  const tarifIdx = getConsultantTarifIndex();
  let total = product.rates[tarifIdx] || 0;
  if (unit.convergence && product.rates[2] !== null) total += product.rates[2];
  if (unit.portabilite && product.rates[3] !== null) total += product.rates[3];
  if (unit.sohoIndep && product.rates[4] !== null) total += product.rates[4];
  return total;
}

function hasInternetInContract(){
  return units['internet'] && units['internet'].length > 0;
}

function renderProductBlock(productId){
  const product = PRODUCTS.find(p => p.id === productId);
  const blockBody = document.getElementById('block-body-' + productId);
  if (!blockBody) return;

  const list = units[productId];
  if (list.length === 0) {
    blockBody.innerHTML = '<div style="font-size:11px;color:#aaa;">Aucune unité ajoutée.</div>';
    return;
  }

  const convergenceOK = product.rates[2] !== null && hasInternetInContract();
  const portabiliteOK = product.rates[3] !== null;
  const sohoOK = product.rates[4] !== null;

  let html = '';
  list.forEach((unit, i) => {
    const eur = calcUnitEUR(product, unit);
    html += `<div class="unit-row">
      <span class="unit-num">#${i+1}</span>`;
    if (convergenceOK) {
      html += `<label><input type="checkbox" ${unit.convergence?'checked':''} onchange="toggleUnitFlag('${productId}',${i},'convergence')"> Convergence (+${product.rates[2]}€)</label>`;
    }
    if (portabiliteOK) {
      html += `<label><input type="checkbox" ${unit.portabilite?'checked':''} onchange="toggleUnitFlag('${productId}',${i},'portabilite')"> Portabilité (+${product.rates[3]}€)</label>`;
    }
    if (sohoOK) {
      html += `<label><input type="checkbox" ${unit.sohoIndep?'checked':''} onchange="toggleUnitFlag('${productId}',${i},'sohoIndep')"> SoHo-Indép. (+${product.rates[4]}€)</label>`;
    }
    html += `<span class="unit-eur">${eur.toFixed(2)} €</span>
      <button class="remove-unit" onclick="removeUnit('${productId}',${i})">🗑</button>
    </div>`;
  });

  blockBody.innerHTML = html;
}

function buildProductsUI(){
  const container = document.getElementById('products');
  container.innerHTML = '';
  PRODUCTS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'product-block';
    div.innerHTML = `
      <div class="product-block-header">
        <span>${p.label}</span>
        <button class="add-unit-btn" onclick="addUnit('${p.id}')">+ Ajouter</button>
      </div>
      <div id="block-body-${p.id}"></div>
    `;
    container.appendChild(div);
    renderProductBlock(p.id);
  });
}

function updateContractPreview(){
  let totalEur = 0;
  let totalAsp = 0;
  PRODUCTS.forEach(p => {
    units[p.id].forEach(unit => {
      totalEur += calcUnitEUR(p, unit);
      totalAsp += p.asp + (unit.sohoIndep ? p.aspSoho : 0);
    });
  });

  // Si Internet présent, ré-affiche les blocs (la disponibilité de Convergence dépend de la présence d'Internet)
  PRODUCTS.forEach(p => renderProductBlock(p.id));

  const aspEl = document.getElementById('contract-asp-preview');
  const eurEl = document.getElementById('contract-eur-preview');
  if (aspEl) aspEl.textContent = Math.round(totalAsp*10)/10;
  if (eurEl) eurEl.textContent = totalEur.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €';
}

window.addUnit = addUnit;
window.removeUnit = removeUnit;
window.toggleUnitFlag = toggleUnitFlag;
window.updateContractPreview = updateContractPreview;

buildProductsUI();
updateContractPreview();

function showTab(id){
 document.querySelectorAll('.section').forEach(x=>x.classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
 if(id==='history') renderHistory();
 if(id==='stats') renderStats();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

window._allContracts = [];

async function saveContract(){
 const nom = document.getElementById('nom').value.trim();
 if (!nom) {
   alert('Merci de renseigner au moins le nom du client.');
   return;
 }

 let aspTotal = 0;
 let eurTotal = 0;
 const produitsDetail = {};

 PRODUCTS.forEach(p => {
   if (units[p.id].length === 0) return;
   produitsDetail[p.id] = units[p.id].map(u => ({...u}));
   units[p.id].forEach(unit => {
     eurTotal += calcUnitEUR(p, unit);
     aspTotal += p.asp + (unit.sohoIndep ? p.aspSoho : 0);
   });
 });

 if (Object.keys(produitsDetail).length === 0) {
   alert('Merci d\'ajouter au moins un produit au contrat.');
   return;
 }

 const data = {
   consultantId: window._currentConsultantId,
   consultantStatutAuMoment: window._currentConsultantStatut || 'BC',
   date: new Date().toISOString(),
   nom,
   societe: document.getElementById('societe').value.trim(),
   tel: document.getElementById('tel').value.trim(),
   tva: document.getElementById('tva').value.trim(),
   clientOrange: document.getElementById('clientOrange').value.trim(),
   contratSmart: document.getElementById('contratSmart').value.trim(),
   email: document.getElementById('email').value.trim(),
   adresse: document.getElementById('adresse').value.trim(),
   dateContrat: document.getElementById('dateContrat').value,
   etatContrat: document.getElementById('etatContrat').value,
   produitsDetail,
   aspTotal: Math.round(aspTotal*10)/10,
   eurTotal: Math.round(eurTotal*100)/100
 };

 try {
   await window.addDoc(window.collection(window.db, 'contrats'), data);
   showToast(`✅ Contrat enregistré (+${data.aspTotal} ASP · ${data.eurTotal.toFixed(2)} €)`);

   // Réinitialiser le formulaire
   ['nom','societe','tel','tva','clientOrange','contratSmart','email','adresse'].forEach(id => {
     document.getElementById(id).value = '';
   });
   PRODUCTS.forEach(p => units[p.id] = []);
   buildProductsUI();
   updateContractPreview();

   if (window.refreshAspTotal) await window.refreshAspTotal();

 } catch(err) {
   alert('Erreur lors de l\'enregistrement: ' + err.message);
 }
}

async function loadContracts(){
  const snap = await window.getDocs(window.query(
    window.collection(window.db, 'contrats'),
    window.where('consultantId', '==', window._currentConsultantId)
  ));
  const list = [];
  snap.forEach(d => list.push({ docId: d.id, ...d.data() }));
  list.sort((a,b) => new Date(b.date) - new Date(a.date));
  window._allContracts = list;
  return list;
}

async function renderHistory(){

  const data = await loadContracts();
  let html='';

  data.forEach((c)=>{

    html+=`
    <div class="card">

      <b>👤 ${escapeHtml(c.nom||'Sans nom')}</b>
      <span class="asp-badge">+${Math.round((c.aspTotal||0)*10)/10} ASP</span>
      <span class="asp-badge" style="background:#E8F5E9;color:#2E7D32;border-color:#c8e6c9;">${(c.eurTotal||0).toFixed(2)} €</span><br>

      🏢 ${escapeHtml(c.societe||'-')}<br>

      📅 ${c.dateContrat ? new Date(c.dateContrat).toLocaleDateString() : new Date(c.date).toLocaleDateString()}<br>

      📊
      <select onchange="changeStatus('${c.docId}', this.value)" style="width:auto;display:inline-block;margin:0 0 0 4px;padding:4px 8px;font-size:12px;">
        <option value="Encodé" ${c.etatContrat==='Encodé'?'selected':''}>📝 Encodé</option>
        <option value="Activé" ${c.etatContrat==='Activé'?'selected':''}>✅ Activé</option>
        <option value="En attente" ${c.etatContrat==='En attente'?'selected':''}>⏳ En attente</option>
        <option value="Annulé" ${c.etatContrat==='Annulé'?'selected':''}>❌ Annulé</option>
        <option value="Refusé" ${c.etatContrat==='Refusé'?'selected':''}>🚫 Refusé</option>
      </select>
      · Statut au moment : ${escapeHtml(c.consultantStatutAuMoment||'BC')}<br><br>

      <button onclick="viewContract('${c.docId}')">
      👁 Voir
      </button>

      <button onclick="deleteContract('${c.docId}')" style="background:#fde2e1;color:#c0392b;border:1px solid #f5b7b1;">
      🗑 Supprimer
      </button>

    </div>
    `;

  });

  document.getElementById('historyList').innerHTML =
    html || 'Aucun contrat';

}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

function viewContract(docId){
  const c = window._allContracts.find(x => x.docId === docId);
  if (!c) return;
  const produitsTxt = Object.keys(c.produitsDetail||{})
    .map(pid => {
      const product = PRODUCTS.find(p => p.id === pid);
      const label = product ? product.label : pid;
      const list = c.produitsDetail[pid];
      return `${label}: ${list.length} unité(s)`;
    })
    .join('\n');
  alert(
    `Client: ${c.nom}\nSociété: ${c.societe||'-'}\nTél: ${c.tel||'-'}\nEmail: ${c.email||'-'}\n` +
    `TVA: ${c.tva||'-'}\nÉtat: ${c.etatContrat}\nStatut au moment: ${c.consultantStatutAuMoment||'BC'}\n` +
    `ASP: ${c.aspTotal} · Montant: ${(c.eurTotal||0).toFixed(2)}€\n\nProduits:\n${produitsTxt || 'Aucun'}`
  );
}

async function changeStatus(docId, newStatus){
  try {
    await window.updateDoc(window.doc(window.db, 'contrats', docId), { etatContrat: newStatus });
    showToast('Statut mis à jour : ' + newStatus);
    renderHistory();
    if (window.refreshAspTotal) await window.refreshAspTotal();
  } catch(err) {
    alert('Erreur: ' + err.message);
  }
}

async function deleteContract(docId){
  const c = window._allContracts.find(x => x.docId === docId);
  const label = c ? `"${c.nom}" du ${c.dateContrat || ''}` : 'ce contrat';
  if (!confirm(`Supprimer définitivement ${label} ?\n\nCette action est irréversible.`)) return;

  try {
    await window.deleteDoc(window.doc(window.db, 'contrats', docId));
    showToast('🗑 Contrat supprimé.');
    renderHistory();
    if (window.refreshAspTotal) await window.refreshAspTotal();
  } catch(err) {
    alert('Erreur lors de la suppression: ' + err.message);
  }
}

async function renderStats(){
 const data = await loadContracts();
 let totals={};
 PRODUCTS.forEach(p=>totals[p.id]=0);
 let totalASP = 0;
 let totalEUR = 0;
 data.forEach(c=>{
   if (c.etatContrat === 'Annulé' || c.etatContrat === 'Refusé') return;
   Object.keys(c.produitsDetail||{}).forEach(pid => {
     totals[pid] = (totals[pid]||0) + c.produitsDetail[pid].length;
   });
   totalASP += c.aspTotal || 0;
   totalEUR += c.eurTotal || 0;
 });
 let html=`<div class="card"><b>Contrats actifs :</b> ${data.filter(c=>c.etatContrat!=='Annulé'&&c.etatContrat!=='Refusé').length}</div>`;
 html+=`<div class="card"><b>ASP généré par les contrats :</b> ${Math.round(totalASP*10)/10}</div>`;
 html+=`<div class="card"><b>Montant total généré :</b> ${totalEUR.toFixed(2)} €</div>`;
 PRODUCTS.forEach(p=>{ if (totals[p.id] > 0) html+=`<div class="card">${p.label} : ${totals[p.id]}</div>`; });
 document.getElementById('statsContent').innerHTML=html;
}

function searchContracts(){

  const term =
    document.getElementById('searchBox')
    .value
    .toLowerCase();

  const cards =
    document.querySelectorAll('#historyList .card');

  cards.forEach(card=>{

    const txt =
      card.textContent.toLowerCase();

    card.style.display =
      txt.includes(term)
      ? 'block'
      : 'none';

  });

}

window.saveContract = saveContract;
window.viewContract = viewContract;
window.changeStatus = changeStatus;
window.deleteContract = deleteContract;
window.showTab = showTab;
window.searchContracts = searchContracts;
window.chg = chg;
window.updateAspPreview = updateAspPreview;
</script>
