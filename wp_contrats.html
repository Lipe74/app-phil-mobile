<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  <link rel="icon"
      type="image/png"
      href="images/logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Contrats & ASP - V1.0</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0}
.app{max-width:1100px;margin:auto;padding:12px 20px;}
.header{background:#ff5a14;color:#fff;padding:20px;border-radius:20px}
.tabs{display:flex;gap:10px;margin:15px 0;flex-wrap:wrap}
.tabbtn{padding:10px 15px;border:none;border-radius:10px;background:#ff5a14;color:#fff;cursor:pointer}
.section{background:#fff;border:1px solid #ffb680;border-radius:18px;padding:20px;margin-bottom:15px}
.hidden{display:none}
input{
  width:100%;
  padding:8px;
  margin:2px 0 6px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}
  select{
  width:100%;
  padding:8px;
  margin:2px 0 6px;
  border:1px solid #ccc;
  border-radius:8px;
  box-sizing:border-box;
}
.row{display:flex;justify-content:space-between;margin:8px 0}
.counter button{width:30px;height:30px}
.card{background:#fafafa;border-radius:10px;padding:10px;margin:8px 0}

input:focus,
select:focus{
  outline:none;
  border-color:#ff5a14;
  box-shadow:0 0 0 4px rgba(255,90,20,.15);
}

.card-client{
  background:white;
  border-radius:18px;
  padding:20px;
  border:2px solid #ffb680;
  margin-bottom:20px;
}

.card-client h3{
  color:#ff5a14;
  margin-bottom:15px;
}

/* FIN AJOUT */
       .client-type{
  display:flex;
  gap:12px;
  margin-top:15px;
}

.type-card{
  flex:1;
  text-align:center;
  padding:14px;
  border:2px solid #ffd1b8;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  background:#fffaf7;
}

.type-card:hover{
  border-color:#ff5a14;
}
 .form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media(max-width:768px){
  .form-grid{
    grid-template-columns:1fr;
  }
}
.date-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:10px;
}

@media(max-width:768px){

  .date-grid{
    grid-template-columns:1fr;
  }

}
</style>
</head>
<body>
<div class="app">
<div class="header">

<h1>📋 Mes contrats</h1>

<div>Build V1 Beta 9</div>

</div>

<div class="search-box">

  <input
    id="searchBox"
    type="text"
    placeholder="🔍 Rechercher un client, société, TVA..."
    onkeyup="searchContracts()">
</div>

<div class="tabs">
<button class="tabbtn" onclick="showTab('new')">📋 Nouveau</button>
<button class="tabbtn" onclick="showTab('history')">📚 Historique</button>
<button class="tabbtn" onclick="showTab('stats')">📊 Statistiques</button>
<button class="tabbtn" onclick="showTab('settings')">⚙️ Paramètres</button>
</div>

<div id="new" class="section">

<div class="card-client">

<h3>👤 Informations client</h3>

<div class="form-grid">

  <input id="nom"
         placeholder="👤 Nom du client (ex : Jean Dupont)">

  <input id="societe"
         placeholder="🏢 Société (ex : Dupont Consulting SRL)">

  <input id="tel"
         placeholder="📞 Téléphone (ex : 0475 24 02 05)">

  <input id="tva"
         placeholder="🧾 TVA (ex : BE0123456789)">

  <input id="clientOrange"
         placeholder="🟧 N° Client Orange (ex : 1.9763217)">

  <input id="contratSmart"
         placeholder="📋 N° Contrat My Smart (ex : 0000282697)">
  <input id="email"
       placeholder="📧 E-mail">

<input id="adresse"
       placeholder="📍 Ville ou adresse">

</div>

<div class="date-grid">

  <div>
    <label>📅 Date du contrat</label>
    <input type="date" id="dateContrat">
  </div>

  <div>
    <label>📊 État du contrat</label>

    <select id="etatContrat">

      <option value="Encodé">📝 Encodé</option>
      <option value="Activé">✅ Activé</option>
      <option value="En attente">⏳ En attente</option>
      <option value="Annulé">❌ Annulé</option>
      <option value="Refusé">🚫 Refusé</option>

    </select>

  </div>

</div>

<div class="client-type">
<label class="type-card">
<input type="radio"
       name="typeClient"
       value="Particulier"
       checked>
👤 Particulier
</label>

<label class="type-card">
<input type="radio"
       name="typeClient"
       value="SoHo">
🏢 SoHo
</label>

</div>

</div>

<h2>📱 Produits</h2>
<div id="products"></div>

<button class="tabbtn" onclick="saveContract()">💾 Enregistrer le contrat</button>
</div>

<div id="history" class="section hidden">
<h2>📚 Historique</h2>
<div id="historyList"></div>
</div>

<div id="stats" class="section hidden">
<h2>📊 Statistiques</h2>
<div id="statsContent"></div>
</div>

<div id="settings" class="section hidden">
<h2>⚙️ Paramètres</h2>
<button class="tabbtn" onclick="exportData()">⬇ Export JSON</button>
<button class="tabbtn" onclick="resetData()">🗑 Réinitialiser</button>
</div>
</div>

<script>
const productNames=[
"small",
"medium",
"large",
"unlimited",

"internetStart",
"internetZen",
"internetGiga",

"tv",
"fixe",
"flybox"
const labels={

small:"📱 Mobile Small",
medium:"📱 Mobile Medium",
large:"📱 Mobile Large",
unlimited:"♾️ Mobile Unlimited",

internetStart:"🌐 Internet Start",
internetZen:"🌐 Internet Zen",
internetGiga:"🚀 Internet Giga",

tv:"📺 TV",
fixe:"☎️ Fixe",
flybox:"📡 Flybox"

};
  productNames.forEach(p=>qty[p]=0);

const container=document.getElementById('products');
productNames.forEach(p=>{
 const d=document.createElement('div');
 d.className='row';
 d.innerHTML=`<span>${labels[p]}</span>
 <span class="counter">
 <button onclick="chg('${p}',-1)">-</button>
 <span id="${p}">0</span>
 <button onclick="chg('${p}',1)">+</button>
 </span>`;
 container.appendChild(d);
});

function chg(id,d){
 qty[id]=Math.max(0,qty[id]+d);
 document.getElementById(id).textContent=qty[id];
}

function showTab(id){
 document.querySelectorAll('.section').forEach(x=>x.classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
 if(id==='history') renderHistory();
 if(id==='stats') renderStats();
}

function saveContract(){
 let data=JSON.parse(localStorage.getItem('contracts')||'[]');
 data.push({
   date:new Date().toISOString(),
   nom:document.getElementById('nom').value,
   tel:document.getElementById('tel').value,
   societe: document.getElementById('societe').value,
tva: document.getElementById('tva').value,
   etatContrat:
document.getElementById('etatContrat').value,
   produits:{...qty}
 });
 localStorage.setItem('contracts',JSON.stringify(data));
 alert('Contrat enregistré');
}

function renderHistory(){

  let data =
    JSON.parse(localStorage.getItem('contracts')||'[]');

  let html='';

  data.forEach((c,i)=>{

    html+=`
    <div class="card">

      <b>👤 ${c.nom||'Sans nom'}</b><br>

      🏢 ${c.societe||'-'}<br>

      📅 ${new Date(c.date).toLocaleDateString()}<br>

      📊 ${c.etatContrat||'Encodé'}<br><br>

      <button onclick="viewContract(${i})">
      👁 Voir
      </button>

      <button onclick="editContract(${i})">
      ✏️ Modifier
      </button>

      <button onclick="delContract(${i})">
      🗑 Supprimer
      </button>

    </div>
    `;

  });

  document.getElementById('historyList').innerHTML =
    html || 'Aucun contrat';

}function viewContract(i){
  alert("Voir contrat : " + i);
}

function editContract(i){
  alert("Modifier contrat : " + i);
}
function delContract(i){
 let data=JSON.parse(localStorage.getItem('contracts')||'[]');
 data.splice(i,1);
 localStorage.setItem('contracts',JSON.stringify(data));
 renderHistory();
}

function renderStats(){
 let data=JSON.parse(localStorage.getItem('contracts')||'[]');
 let totals={};
 productNames.forEach(p=>totals[p]=0);
 data.forEach(c=>productNames.forEach(p=>totals[p]+=c.produits[p]||0));
 let html=`<div class="card"><b>Contrats :</b> ${data.length}</div>`;
 productNames.forEach(p=>html+=`<div class="card">${labels[p]} : ${totals[p]}</div>`);
 document.getElementById('statsContent').innerHTML=html;
}

function exportData(){
 const data=localStorage.getItem('contracts')||'[]';
 const blob=new Blob([data],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='contrats_export.json';
 a.click();
}

function resetData(){
 if(confirm('Supprimer toutes les données ?')){
  localStorage.removeItem('contracts');
 }
}
  function searchContracts(){

  const term =
    document.getElementById('searchBox')
    .value
    .toLowerCase();

  const cards =
    document.querySelectorAll('#historyList .card');

  cards.forEach(card=>{

    const txt =
      card.textContent.toLowerCase();

    card.style.display =
      txt.includes(term)
      ? 'block'
      : 'none';

  });

}
</script>
</body>
</html>
