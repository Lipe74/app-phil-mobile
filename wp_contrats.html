<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contrats & ASP (by Phil-Mobile)</title>

<link rel="icon" type="image/png" href="images/logo.png">
<link rel="apple-touch-icon" href="images/logo.png">

<style>
  .counter{
  display:flex;
  align-items:center;
  gap:10px;
}

.counter button{
  width:34px;
  height:34px;
  border:none;
  border-radius:8px;
  background:#ff5a14;
  color:white;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.counter span{
  min-width:25px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
}

.app{
  max-width:1000px;
  margin:0 auto;
  padding:24px;
}

.header{
  background:#ff5a14;
  border-radius:24px;
  padding:22px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:16px;
}

.header-logo{
  width:64px;
  height:64px;
  border-radius:14px;
  background:white;
  padding:4px;
  object-fit:contain;
}

.header-title{
  color:white;
  font-size:30px;
  font-weight:bold;
}

.header-sub{
  color:rgba(255,255,255,0.9);
  font-size:15px;
}

.section{
  background:white;
  border:1.5px solid #ffb680;
  border-radius:22px;
  padding:26px;
  margin-bottom:16px;
}

.section-title{
  font-size:24px;
  font-weight:700;
  color:#222;
  margin-bottom:20px;
}

.placeholder{
  color:#777;
  font-size:16px;
  text-align:center;
  padding:30px;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">

    <img class="header-logo"
         src="https://app.phil-mobile.be/images/logo.png"
         alt="Phil-Mobile">

    <div>

      <div class="header-title">
        📋 Contrats & ASP
      </div>

      <div class="header-sub">
        Suivi des ventes Orange et Eneco
      </div>

      <div style="margin-top:8px;color:rgba(255,255,255,.85);font-size:13px;font-weight:600;">
        Build 5.7 Beta - Juin 2026
      </div>

    </div>

  </div>

  <div class="section">

    <div class="section-title">
<div class="section-title">
👤 Informations client
</div>

<input placeholder="Nom du client">

<input placeholder="Téléphone">

<input placeholder="N° Client Orange">

<input placeholder="N° Contrat My Smart">

<label>
<input type="radio" name="typeClient" checked>
Particulier
</label>

      <div class="section-title">
📱 Produits Orange
        <div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:10px;">
  <span>📱 Mobile Small</span>
  <div class="counter">
    <button onclick="changeQty('small',-1)">-</button>
    <span id="small">0</span>
    <button onclick="changeQty('small',1)">+</button>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:10px;">
  <span>📱 Mobile Medium</span>
  <div class="counter">
    <button onclick="changeQty('medium',-1)">-</button>
    <span id="medium">0</span>
    <button onclick="changeQty('medium',1)">+</button>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:10px;">
  <span>📱 Mobile Large</span>
  <div class="counter">
    <button onclick="changeQty('large',-1)">-</button>
    <span id="large">0</span>
    <button onclick="changeQty('large',1)">+</button>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:10px;">
  <span>📱 Mobile Unlimited</span>
  <div class="counter">
    <button onclick="changeQty('unlimited',-1)">-</button>
    <span id="unlimited">0</span>
    <button onclick="changeQty('unlimited',1)">+</button>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:10px;">
  <span>🌐 Internet</span>
  <div class="counter">
    <button onclick="changeQty('internet',-1)">-</button>
    <span id="internet">0</span>
    <button onclick="changeQty('internet',1)">+</button>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:10px;">
  <span>📺 TV</span>
  <div class="counter">
    <button onclick="changeQty('tv',-1)">-</button>
    <span id="tv">0</span>
    <button onclick="changeQty('tv',1)">+</button>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:10px;">
  <span>☎️ Fixe</span>
  <div class="counter">
    <button onclick="changeQty('fixe',-1)">-</button>
    <span id="fixe">0</span>
    <button onclick="changeQty('fixe',1)">+</button>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:10px;">
  <span>📡 Flybox</span>
  <div class="counter">
    <button onclick="changeQty('flybox',-1)">-</button>
    <span id="flybox">0</span>
    <button onclick="changeQty('flybox',1)">+</button>
  </div>
</div>
</div>

<label>
<input type="radio" name="typeClient">
SoHo
</label>    </div>

    <div class="placeholder">
      Module Contrats & ASP bientôt disponible.
    </div>

  </div>

</div>
<script>

function changeQty(id, delta){

  const el = document.getElementById(id);

  let value = parseInt(el.textContent) || 0;

  value += delta;

  if(value < 0) value = 0;

  el.textContent = value;

}

</script>
</body>
</html>
