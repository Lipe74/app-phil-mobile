<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contrats & ASP (by Phil-Mobile)</title>

<link rel="icon" type="image/png" href="images/logo.png">
<link rel="apple-touch-icon" href="images/logo.png">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
}

.app{
  max-width:1000px;
  margin:0 auto;
  padding:24px;
}

.header{
  background:#ff5a14;
  border-radius:24px;
  padding:22px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:16px;
}

.header-logo{
  width:64px;
  height:64px;
  border-radius:14px;
  background:white;
  padding:4px;
  object-fit:contain;
}

.header-title{
  color:white;
  font-size:30px;
  font-weight:bold;
}

.header-sub{
  color:rgba(255,255,255,0.9);
  font-size:15px;
}

.section{
  background:white;
  border:1.5px solid #ffb680;
  border-radius:22px;
  padding:26px;
  margin-bottom:16px;
}

.section-title{
  font-size:24px;
  font-weight:700;
  color:#222;
  margin-bottom:20px;
}

.placeholder{
  color:#777;
  font-size:16px;
  text-align:center;
  padding:30px;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">

    <img class="header-logo"
         src="https://app.phil-mobile.be/images/logo.png"
         alt="Phil-Mobile">

    <div>

      <div class="header-title">
        📋 Contrats & ASP
      </div>

      <div class="header-sub">
        Suivi des ventes Orange et Eneco
      </div>

      <div style="margin-top:8px;color:rgba(255,255,255,.85);font-size:13px;font-weight:600;">
        Build 5.7 Beta - Juin 2026
      </div>

    </div>

  </div>

  <div class="section">

    <div class="section-title">
      🚧 Développement en cours
    </div>

    <div class="placeholder">
      Module Contrats & ASP bientôt disponible.
    </div>

  </div>

</div>

</body>
</html>
